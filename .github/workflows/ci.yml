name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Mehrere Pushes in kurzer Folge: nur den letzten Run weiterlaufen lassen.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Python 3.12 + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          # Test-Tooling + dev-deps (moto[s3] fuer S3-Backup-Tests).
          # dev-requirements.txt ist optional (moto nur fuer Tests noetig),
          # aber ohne sie scheitert pytest collection in den Backup-Tests.
          if [ -f backend/dev-requirements.txt ]; then
            pip install -r backend/dev-requirements.txt
          fi
          # pytest als Fallback falls dev-requirements nicht existiert.
          pip install pytest 2>/dev/null || true

      # Lifespan-Hook in backend/main.py legt /opt/msm/{servers,backups} an.
      # Damit der TestClient den Lifespan durchlaeuft, brauchen wir die
      # Verzeichnisse mit Schreibrechten fuer den Runner-User.
      - name: Prepare /opt/msm runtime directories
        run: |
          sudo mkdir -p /opt/msm/servers /opt/msm/backups
          sudo chown -R "$USER":"$USER" /opt/msm

      - name: Run pytest
        working-directory: backend
        run: python -m pytest -q

  frontend:
    name: Frontend (Node 20 + build + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc + vite)
        run: npm run build

      - name: Test (vitest)
        run: npm test
