name: Recovery App Release

# Triggers when a release tag (e.g. recovery-v1.0.0) is pushed.
# Builds the MSM Backup Recovery Tauri desktop app and attaches
# the installers to the GitHub Release.

on:
  push:
    tags:
      - "recovery-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. recovery-v1.0.0)"
        required: false

permissions:
  contents: write

concurrency:
  group: recovery-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build Recovery App (Windows)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: recovery

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: recovery/package-lock.json

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: recovery/src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: TypeCheck
        run: npx tsc --noEmit

      - name: Run vitest
        run: npx vitest run

      - name: Run Rust tests
        working-directory: recovery/src-tauri
        run: cargo test

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: recovery
          tagName: ${{ github.ref_name }}
          releaseName: "MSM Backup Recovery ${{ github.ref_name }}"
          releaseBody: "Standalone Desktop-App zum Entschlüsseln von MSM Backup .enc-Dateien. Offline, DIS-verschlüsselt, keine Server-Verbindung nötig."
          releaseDraft: true
          prerelease: false
          args: --target x86_64-pc-windows-msvc

  build-linux:
    name: Build Recovery App (Linux)
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: recovery

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: recovery/package-lock.json

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: recovery/src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: recovery
          tagName: ${{ github.ref_name }}
          releaseName: "MSM Backup Recovery ${{ github.ref_name }}"
          releaseBody: "Standalone Desktop-App zum Entschlüsseln von MSM Backup .enc-Dateien. Offline, DIS-verschlüsselt, keine Server-Verbindung nötig."
          releaseDraft: true
          prerelease: false
          args: --target x86_64-unknown-linux-gnu
