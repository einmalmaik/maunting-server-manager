id: dayz
name: DayZ
short_name: DayZ
steam_app_id: 221100
steamcmd_app_id: 223350
supports_mods: true
mod_system: steam
supports_wine: false
install_method: steamcmd
executable_name: DayZServer.exe
default_ports:
  - name: game
    port: 2302
    protocol: udp
    description: Main game port
  - name: query
    port: 27016
    protocol: udp
    description: Steam query port
  - name: rcon
    port: 2311
    protocol: tcp
    description: BattlEye RCON port
config_files:
  - serverDZ.cfg
  - cfgdayz\profiles\users.cfg
save_paths:
  - mpmissions\dayzOffline.chernarusplus\storage_1
